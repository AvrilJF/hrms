spring:
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/hrms_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root  # 替换成你的MySQL用户名
    password: 123456  # 替换成你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Security配置（简化）
  security:
    user:
      name: admin
      password: admin123

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.hrms.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api